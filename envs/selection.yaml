name: hgn-selection
channels:
  - conda-forge
  - bioconda
  - nodefaults          # never resolve from `defaults`/`anaconda`: those channels
                        # carry a commercial ToS and different builds of the same
                        # version. Build with `--override-channels` too (see
                        # scripts/sh/build_envs.sh) so a stray ~/.condarc cannot
                        # reintroduce them.
dependencies:
  - hyphy=2.5             # BUSTED (episodic positive selection) + RELAX (intensification)
  - mafft=7.5            # protein alignment for codon-aware back-translation
  - fasttree=2.1.11      # per-family gene tree for HyPhy
  - python=3.11
  - biopython=1.83
  - pandas=2.2
  - pyyaml=6.0
